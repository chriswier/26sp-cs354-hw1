name: Autograder

on: [push]

jobs:
  grade:
    runs-on: harbor.cs.calvin.edu/calvincs-public/devcontainer-cs354-autograde:latest

    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_USER: admin
    #       POSTGRES_PASSWORD: admin
    #       POSTGRES_DB: manga
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Load schema
      #   run: |
      #     PGPASSWORD=admin psql -h localhost -U admin -d manga -f sql/01_schema.sql

      # - name: Load seed data
      #   run: |
      #     PGPASSWORD=admin psql -h localhost -U admin -d manga -f sql/02_seed.sql

      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.12"

      # - name: Install dependencies
      #   run: pip install -r requirements.txt

      - name: Run autograder
        run: python grade.py

      # Post a formatted score table to the Actions summary.
      # Only reads results.json — never exposes hashes or answer queries.
      - name: Post results as summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          try:
              with open("results.json") as f:
                  data = json.load(f)
              total    = data["total_score"]
              max_s    = data["max_score"]
              questions = data["questions"]

              lines = [
                  "## hw01-starting-with-sql \u2014 Grading Results\n",
                  f"**Score: {total}/{max_s} pts**\n",
                  "| Question | Result | Points |",
                  "|----------|--------|--------|",
              ]
              for i in range(1, 21):
                  q     = questions.get(str(i), {})
                  score = q.get("score", 0)
                  st    = q.get("status", "fail")
                  icon  = "\u2705" if st == "pass" else "\u274c"
                  lines.append(f"| Q{i:02d} | {icon} | {score}/5 |")

              summary = "\n".join(lines) + "\n"
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(summary)
          except Exception as e:
              print(f"Could not write summary: {e}")
          PYEOF
